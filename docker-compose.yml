version: '3.8'
networks:
  default:
    driver: bridge
    ipam:
      config:
        - subnet: 10.5.0.0/22
services:
  data-collector:
    build: .
    container_name: aster_data_collector
    environment:
      - RESTART_MINUTES=2
    env_file:
      - .env
    volumes:
      # Mount entire directory so ASTER_data/ files are accessible both inside and outside container
      # This ensures data collector works identically whether run natively or with Docker
      # - Native: saves to ./ASTER_data/ relative to script location
      # - Docker: saves to /app/ASTER_data/ which maps back to ./ASTER_data/ on host
      - ./:/app/
    command: >
      sh -c "while true; do \
        python data_collector.py; \
        sleep ${RESTART_MINUTES}m; \
      done"
    restart: unless-stopped

